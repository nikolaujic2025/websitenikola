    <div class="container my-5">
        <h2>Dodaj proizvod</h2>

        <input type="text" id="name" class="form-control mb-2" placeholder="Naziv">
        <input type="text" id="price" class="form-control mb-2" placeholder="Cijena">
        <input type="text" id="image" class="form-control mb-2" placeholder="URL slike">
        <img id="preview" width="100" class="mb-2">
        <select id="category" class="form-control mb-2">
            <option value="plisaneigracke">Plišane</option>
            <option value="duksevi">Duksevi</option>
            <option value="majice">Majice</option>
            <option value="trenerke">Trenerke</option>
        </select>

        <button class="btn btn-success" onclick="addProduct()">Dodaj</button>



        <ul id="productList"></ul>
        <h3 class="mt-4">Svi proizvodi</h3>
        <ul id="productList" class="list-group"></ul>
        <script>
            let editIndex = -1;

            function loadProducts() {
                let products = JSON.parse(localStorage.getItem("products")) || [];
                let list = document.getElementById("productList");
                list.innerHTML = "";

                products.forEach((p, index) => {
                    list.innerHTML += `
        <li class="list-group-item d-flex justify-content-between align-items-center">
            ${p.name} - ${p.price} KM

            <div>
                <button class="btn btn-warning btn-sm" onclick="editProduct(${index})">Edit</button>
                <button class="btn btn-warning btn-sm" onclick="deleteProduct(${index})">Delete</button>
                </div>
        `;
                });
            }

            function addProduct() {
                let product = {
                    name: document.getElementById("name").value,
                    price: document.getElementById("price").value,
                    image: document.getElementById("image").value,
                    category: document.getElementById("category").value
                };

                let products = JSON.parse(localStorage.getItem("products")) || [];

                if (editIndex === -1) {
                    products.push(product);
                } else {
                    products[editIndex] = product;
                    editIndex = -1;
                }

                localStorage.setItem("products", JSON.stringify(products));
                clearForm();
                loadProducts();
            }

            function deleteProduct(index) {
                if (confirm("Da li si siguran da želiš obrisati proizvod?")) {

                    let products = JSON.parse(localStorage.getItem("products")) || [];
                    products.splice(index, 1);
                    localStorage.setItem("products", JSON.stringify(products));

                    loadProducts();
                }
            }
            function editProduct(index) {
                let products = JSON.parse(localStorage.getItem("products")) || [];
                let p = products[index];

                document.getElementById("name").value = p.name;
                document.getElementById("price").value = p.price;
                document.getElementById("image").value = p.image;
                document.getElementById("category").value = p.category;

                editIndex = index;
            }

            function clearForm() {
                document.getElementById("name").value = "";
                document.getElementById("price").value = "";
                document.getElementById("image").value = "";
                document.getElementById("category").value = "plisaneigracke";
            }

            loadProducts();

            document.getElementById("image").addEventListener("input", function () {
                document.getElementById("preview").src = this.value;
            });

            const user = localStorage.getItem("loggedInUser");

            const userInfo = document.getElementById("userInfo");
            const logoutBtn = document.getElementById("logoutBtn");
            const loginBtn = document.getElementById("loginBtn");

            if (user) {
                // prikaži usera
                userInfo.textContent = user;

                // pokaži logout
                logoutBtn.classList.remove("d-none");

                // sakrij login
                loginBtn.classList.add("d-none");
            } else {
                userInfo.textContent = "";
            }

            // logout funkcija
            logoutBtn.addEventListener("click", function () {
                localStorage.removeItem("loggedInUser");
                window.location.href = "login.html";
            });

        </script>
