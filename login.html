<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikola Ujić-Prijava</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ikonice -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body style="background: linear-gradient(135deg, orange, orange);">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px; border-radius: 15px;">
            
            <div class="text-center mb-4">
                <i class="fa fa-user-circle fa-3x mb-2"></i>
                <h3>Login</h3>
                <p class="text-muted">Prijavi se na svoj račun</p>
            </div>

            <form>
                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email adresa</label>
                    <input type="email" class="form-control" placeholder="Unesi email" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">Lozinka</label>
                    <input type="password" class="form-control" placeholder="Unesi lozinku" required>
                </div>

                <!-- Remember me -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Zapamti me</label>
                </div>

                <!-- Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark">Prijavi se</button>
                </div>

                <!-- Links -->
                <div class="text-center mt-3">
                    <a href="#" class="text-decoration-none">Zaboravljena lozinka?</a>
                </div>

                <div class="text-center mt-2">
                    <p>Nemaš račun? <a href="register.html" class="text-decoration-none">Registruj se</a></p>
                    <p>Administrator si?<a href="adminlogin.html" class="text-decoration-none">Prijavi se kao administrator</a></p>
                </div>
            </form>

        </div>
    </div>

</body>
