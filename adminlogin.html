<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center vh-100" style="background: linear-gradient(135deg, orange, orange);">

<div class="card p-4" style="width: 300px;">
    <h3 class="text-center">Admin Login</h3>

    <input type="text" id="username" class="form-control mb-2" placeholder="Username">
    <input type="password" id="password" class="form-control mb-2" placeholder="Password">

    <button class="btn btn-dark w-100" onclick="login()">Login</button>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "Nikola.Ujic" && pass === "qwertzuiopšđž") {
        localStorage.setItem("isAdmin", "true");
        window.location.href = "admin.html";
    } else {
        alert("Pogrešan login!");
    }
}

if(localStorage.getItem("isAdmin") !== "true") {
    window.location.href = "login.html";
}

function logout() {
    localStorage.removeItem("isAdmin");
    window.location.href = "login.html";
}

</script>

</body>
</html>
